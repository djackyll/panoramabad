name: Temperaturen abrufen

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Temperaturen abrufen und speichern
        run: python3 scrape.py

      - name: Änderungen committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.csv
          git diff --cached --quiet || git commit -m "Update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
